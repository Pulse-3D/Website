<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse 3D Models</title>
  <meta
    name="description"
    content="Search and buy printable Pulse 3D designs."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
  <script defer src="script.js"></script>
</head>
<body>
  <header class="site-header">
    <nav class="nav" aria-label="Main navigation">
      <a class="brand" href="index.html">
        <svg viewBox="0 0 64 64" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
          <path d="M32 4L8 18v28l24 14 24-14V18L32 4z" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/>
          <path d="M32 4v56M8 18l24 14 24-14M8 46l24-14 24 14M32 18v28" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        </svg>
        <span class="brand-text">
          <span class="brand-company">Pulse 3D</span>
          <span class="brand-tagline">Digital Design</span>
        </span>
      </a>
      <div class="nav-links">
        <a href="index.html#services">Services</a>
        <a href="index.html#contact">Contact</a>
        <a href="login.html">Login</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="page-hero">
      <p class="eyebrow">Model shop</p>
      <h1>Browse printable designs from Pulse 3D.</h1>
      <p class="hero-text">
        Search available designs, check the price, and request to buy the model
        you want.
      </p>
    </section>

    <section class="section" aria-labelledby="listings-title">
      <div class="shop-heading">
        <div class="section-heading">
          <p class="eyebrow">Design catalog</p>
          <h2 id="listings-title">Shop designs</h2>
        </div>

        <label class="search-control">
          Search designs
          <input id="design-search" type="search" placeholder="Search by name or STL file" />
        </label>
      </div>
      <p id="shop-status" class="copy-status" aria-live="polite"></p>
      <div id="model-list" class="listing-grid"></div>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; <span id="year"></span> Pulse 3D. All rights reserved.</p>
    <p class="visitor-count">Site visits: <span id="visit-count">0</span></p>
  </footer>
</body>
</html>
