<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse 3D Models</title>
  <meta
    name="description"
    content="Upload STL files and create model listings for Pulse 3D."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
  <script defer src="script.js"></script>
</head>
<body>
  <header class="site-header">
    <nav class="nav" aria-label="Main navigation">
      <a class="brand" href="index.html">Pulse 3D</a>
      <div class="nav-links">
        <a href="index.html#services">Services</a>
        <a href="index.html#contact">Contact</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="page-hero">
      <p class="eyebrow">Model shop</p>
      <h1>Browse printable designs from Pulse 3D.</h1>
      <p class="hero-text">
        Search available designs, check the price, and request to buy the model
        you want.
      </p>
    </section>

    <section class="section" aria-labelledby="listings-title">
      <div class="shop-heading">
        <div class="section-heading">
          <p class="eyebrow">Design catalog</p>
          <h2 id="listings-title">Shop designs</h2>
        </div>

        <label class="search-control">
          Search designs
          <input id="design-search" type="search" placeholder="Search by name or STL file" />
        </label>
      </div>
      <div id="model-list" class="listing-grid"></div>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; <span id="year"></span> Pulse 3D. All rights reserved.</p>
    <p class="visitor-count">Site visits: <span id="visit-count">0</span></p>
  </footer>
</body>
</html>
