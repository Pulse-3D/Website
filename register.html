<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse 3D Create Account</title>
  <meta
    name="description"
    content="Create a customer account for Pulse 3D."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
  <script defer src="script.js"></script>
</head>
<body>
  <header class="site-header">
    <nav class="nav" aria-label="Main navigation">
      <a class="brand" href="index.html">
        <svg viewBox="0 0 64 64" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
          <path d="M32 4L8 18v28l24 14 24-14V18L32 4z" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/>
          <path d="M32 4v56M8 18l24 14 24-14M8 46l24-14 24 14M32 18v28" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        </svg>
        <span class="brand-text">
          <span class="brand-company">Pulse 3D</span>
          <span class="brand-tagline">Digital Design</span>
        </span>
      </a>
      <div class="nav-links">
        <a href="models.html">Shop</a>
        <a href="login.html">Login</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="page-hero">
      <p class="eyebrow">Create account</p>
      <h1>Create your Pulse 3D account.</h1>
      <p class="hero-text">
        Create a public account to browse and request designs. Owners can still use the same single login form for admin access.
      </p>
    </section>

    <section class="section" aria-label="Create account form">
      <form id="register-form" class="auth-card">
        <p class="eyebrow">New account</p>
        <h2>Sign up</h2>
        <label>
          Email
          <input name="email" type="email" placeholder="you@gmail.com" required />
        </label>
        <label>
          Password
          <input name="password" type="password" placeholder="At least 8 characters" required />
        </label>
        <label>
          Confirm password
          <input name="confirmPassword" type="password" placeholder="Repeat password" required />
        </label>
        <div class="auth-actions">
          <button class="button primary" type="submit">Create account</button>
          <a class="button secondary" href="login.html">Back to login</a>
        </div>
        <p id="register-status" class="copy-status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; <span id="year"></span> Pulse 3D. All rights reserved.</p>
    <p class="visitor-count">Site visits: <span id="visit-count">0</span></p>
  </footer>
</body>
</html>
